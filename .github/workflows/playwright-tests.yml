name: Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 02:00 AM SAST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (all for scheduled, chromium for push/PR)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npx playwright install --with-deps chromium firefox webkit
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npx playwright test --project=chromium --project=firefox --project=webkit
          else
            npx playwright test tests/smoke.spec.ts --project=chromium
          fi
        continue-on-error: true
        env:
          TEST_ENV: qa

      - name: Download previous Allure history
        uses: actions/cache@v5
        with:
          path: allure-history
          key: allure-history-${{ github.ref_name }}
          restore-keys: |
            allure-history-

      - name: Copy history from previous runs
        run: |
          if [ -d "allure-history/last-history" ]; then
            mkdir -p allure-results/history
            cp -r allure-history/last-history/* allure-results/history/ || true
          fi

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Save history for next run
        run: |
          mkdir -p allure-history
          cp -r allure-report/history allure-history/last-history || true

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Setup GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
